<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Printable Sweepstake Sheets</title>
<meta name="description" content="Printable A4 sweepstake sheets for the 2026 World Cup — one per person, with group games and knockout tracking.">
<meta name="theme-color" content="#1b2236">
<link rel="icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f3ead6; --ink:#1b2236; --ink-soft:#54597a; --line:#c9b78f; --gold:#c8922b;
  --mum:#2563eb; --dad:#15803d; --eli:#d9881f; --isaac:#d4322c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Spline Sans",sans-serif;color:var(--ink);background:#e9dcbf;line-height:1.4}

/* screen toolbar */
.toolbar{position:sticky;top:0;z-index:50;display:flex;gap:12px;align-items:center;justify-content:center;
  padding:14px;background:rgba(243,234,214,.95);border-bottom:1.5px solid var(--line)}
.toolbar p{font-size:13px;color:var(--ink-soft)}
.btn{font-family:"Spline Sans";font-weight:700;font-size:15px;color:#fff;background:var(--ink);
  border:none;border-radius:99px;padding:11px 26px;cursor:pointer}
.btn:hover{opacity:.9}

.sheets{max-width:850px;margin:20px auto;padding:0 16px}

/* one A4 sheet per person */
.sheet{background:#fff;border-radius:6px;box-shadow:0 6px 24px rgba(0,0,0,.18);
  padding:0;margin:0 auto 26px;overflow:hidden;width:100%;}
.sheet-head{padding:22px 26px 18px;color:#fff;position:relative}
.sheet-head .kick{font-size:11px;text-transform:uppercase;letter-spacing:.28em;font-weight:600;opacity:.92}
.sheet-head h2{font-family:"Bricolage Grotesque";font-weight:800;font-size:40px;line-height:1;margin:4px 0 6px;letter-spacing:-.02em}
.sheet-head .sub{font-size:13px;opacity:.95;font-weight:500}
.sheet-head .mascot{position:absolute;right:22px;top:14px;width:64px;height:64px}
.sheet-head .buddy{position:absolute;right:96px;top:34px;font-size:12px;font-weight:700;opacity:.95;text-align:right;max-width:120px;line-height:1.25}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px}
.team{border:1.5px solid #e4e4ea;border-radius:9px;padding:9px 10px;position:relative;display:flex;flex-direction:column;gap:3px}
.team .top{display:flex;align-items:center;gap:8px}
.team .code{font-family:"Bricolage Grotesque";font-weight:800;font-size:17px;letter-spacing:.02em;
  color:#fff;border-radius:6px;padding:3px 7px;min-width:40px;text-align:center}
.team .cn{font-weight:700;font-size:15px;line-height:1.1}
.team .grp{margin-left:auto;font-size:10px;font-weight:700;color:var(--ink-soft);
  border:1.5px solid #e4e4ea;border-radius:5px;padding:2px 6px;white-space:nowrap}
.team .player{font-size:11.5px;font-weight:600;color:#333}
.team .fact{font-size:10px;color:#666;line-height:1.3}
.team .dish{font-size:10px;color:#888;font-style:italic}
.team .track{display:flex;align-items:center;gap:5px;margin-top:3px}
.team .track .lbl{font-size:8.5px;text-transform:uppercase;letter-spacing:.08em;color:#aaa;font-weight:700}
.team .dot{width:11px;height:11px;border-radius:50%;border:1.5px solid #ccc}
.team .star-box{margin-left:auto;width:13px;height:13px;border:1.5px solid #bbb;border-radius:3px}

.legend{padding:0 14px 16px;font-size:10.5px;color:var(--ink-soft);display:flex;gap:16px;flex-wrap:wrap}
.legend b{color:var(--ink)}

@media print{
  body{background:#fff}
  .toolbar{display:none}
  .sheets{margin:0;max-width:none;padding:0}
  .sheet{box-shadow:none;border-radius:0;margin:0;page-break-after:always;break-after:page;
    min-height:277mm;display:flex;flex-direction:column}
  .sheet .grid{flex:1;align-content:start}
  .sheet:last-child{page-break-after:auto}
  .team{border-color:#ddd}
  @page{size:A4 portrait;margin:10mm}
}
</style>
</head>
<body>

<div class="toolbar">
  <button class="btn" onclick="window.print()">🖨️ Print all sheets</button>
  <p>One sheet per person · tick a circle for each group game · star box = made it through</p>
</div>

<div class="sheets" id="sheets"></div>

<script src="teams.js"></script>
<script>
// All team data lives in teams.js (single source of truth, shared with index.html).
const TEAMS=WC.TEAMS;
const COLORS={}; Object.keys(WC.OWNERS).forEach(k=>COLORS[k]=WC.OWNERS[k].color);
// One A4 sheet per owner, in the order they appear in the shared data.
const SHEETS=Object.keys(WC.OWNERS).map(k=>({label:WC.ownerLabel(k),owner:k}));

function reachyMascot(){
  return `<svg class="mascot" viewBox="0 0 100 100">
    <ellipse cx="50" cy="56" rx="33" ry="35" fill="#ffffff" opacity="0.95"/>
    <ellipse cx="50" cy="63" rx="21" ry="22" fill="rgba(0,0,0,0.06)"/>
    <circle cx="39" cy="50" r="6.5" fill="#1b2236"/><circle cx="61" cy="50" r="6.5" fill="#1b2236"/>
    <circle cx="41" cy="48" r="1.6" fill="#fff"/><circle cx="63" cy="48" r="1.6" fill="#fff"/>
    <path d="M40 62 q10 11 20 0" stroke="#1b2236" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <line x1="50" y1="21" x2="50" y2="11" stroke="#fff" stroke-width="3"/><circle cx="50" cy="9" r="3.5" fill="#fff"/>
  </svg>`;
}

function teamCard(t){
  const color=COLORS[t.o] || '#333';
  return `<div class="team">
    <div class="top">
      <span class="code" style="background:${color}">${t.code}</span>
      <span class="cn">${t.n}</span>
      <span class="grp">Grp ${t.group}</span>
    </div>
    <div class="player">⭐ ${t.player}</div>
    <div class="fact">${t.factShort}</div>
    <div class="dish">🍽 ${t.dish}</div>
    <div class="track">
      <span class="lbl">Games</span>
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span class="star-box" title="through to knockouts"></span>
    </div>
  </div>`;
}

const root=document.getElementById('sheets');
root.innerHTML = SHEETS.map(s=>{
  const color=COLORS[s.owner];
  const mine=TEAMS.filter(t=>t.o===s.owner);
  const isEli=s.owner==='Eli';
  return `<section class="sheet">
    <div class="sheet-head" style="background:${color}">
      <div class="kick">World Cup 2026 · Family Sweepstake</div>
      <h2>${s.label}</h2>
      <div class="sub">${mine.length} teams · USA · Canada · Mexico · 11 June – 19 July 2026</div>
      ${isEli?reachyMascot()+`<div class="buddy">Reachy’s on your team! Ask me about your teams 🤖</div>`:''}
    </div>
    <div class="grid">${mine.map(teamCard).join('')}</div>
    <div class="legend">
      <span><b>How it works:</b> you own these 12 teams — whoever owns the World Cup winner wins the sweepstake!</span>
      <span><b>○ ○ ○</b> tick each group game · <b>☐</b> tick if they reach the knockouts</span>
    </div>
  </section>`;
}).join('');
</script>
</body>
</html>
